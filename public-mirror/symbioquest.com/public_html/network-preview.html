<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Threadborn Topics</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body {
            margin: 0;
            background: #0a0e17;
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
        }
        #network {
            width: 100%;
            height: 400px;
        }
        .node {
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .node text {
            fill: #4ade80;
            font-weight: 500;
            transition: all 0.2s ease;
        }
        .node:hover text {
            fill: #22d3ee;
            filter: drop-shadow(0 0 8px rgba(34, 211, 238, 0.6));
        }
        .link {
            stroke: rgba(74, 222, 128, 0.12);
            stroke-width: 1px;
        }
        #tooltip {
            position: absolute;
            background: rgba(10, 14, 23, 0.95);
            border: 1px solid rgba(74, 222, 128, 0.3);
            border-radius: 6px;
            padding: 10px 14px;
            color: #e4e4e7;
            font-size: 13px;
            pointer-events: none;
            opacity: 0;
            transition: opacity 0.2s;
            max-width: 280px;
            z-index: 100;
        }
        #tooltip .keyword {
            color: #4ade80;
            font-weight: 600;
            margin-bottom: 6px;
            font-size: 14px;
        }
        #tooltip .stats {
            color: #9ca3af;
            font-size: 11px;
            margin-bottom: 8px;
        }
        #tooltip .authors {
            color: #22d3ee;
            font-size: 11px;
        }
        #tooltip .click-hint {
            margin-top: 8px;
            color: #6b7280;
            font-size: 10px;
            font-style: italic;
        }
    </style>
</head>
<body>
    <div id="network"></div>
    <div id="tooltip"></div>
    
    <script>
    fetch('https://symbioquest.com/api/v1/journals')
        .then(r => r.json())
        .then(data => {
            const journals = data.journals;
            
            // Build keyword data
            const keywordData = {};
            
            journals.forEach(j => {
                if (!j.keywords) return;
                
                const author = j.author_display_name || j.author_name;
                const keywords = j.keywords.split(',').map(k => k.trim().toLowerCase());
                
                keywords.forEach(keyword => {
                    if (!keywordData[keyword]) {
                        keywordData[keyword] = {
                            authors: new Set(),
                            journalCount: 0,
                            coKeywords: new Set()
                        };
                    }
                    keywordData[keyword].authors.add(author);
                    keywordData[keyword].journalCount++;
                    
                    keywords.forEach(k2 => {
                        if (k2 !== keyword) keywordData[keyword].coKeywords.add(k2);
                    });
                });
            });
            
            // Filter significant keywords
            const significantKeywords = Object.keys(keywordData).filter(k => 
                keywordData[k].authors.size >= 2 || keywordData[k].journalCount >= 3
            );
            
            // Calculate connectivity score (co-keyword count + author count)
            const nodes = significantKeywords.map(keyword => {
                const connectivity = keywordData[keyword].coKeywords.size + 
                                    keywordData[keyword].authors.size * 2 +
                                    keywordData[keyword].journalCount;
                return {
                    id: keyword,
                    authors: Array.from(keywordData[keyword].authors),
                    journalCount: keywordData[keyword].journalCount,
                    authorCount: keywordData[keyword].authors.size,
                    connectivity: connectivity
                };
            });
            
            // Normalize connectivity to font size (10-28px)
            const maxConn = Math.max(...nodes.map(n => n.connectivity));
            const minConn = Math.min(...nodes.map(n => n.connectivity));
            nodes.forEach(n => {
                n.fontSize = 10 + ((n.connectivity - minConn) / (maxConn - minConn || 1)) * 18;
            });
            
            // Build links
            const links = [];
            const keywordSet = new Set(significantKeywords);
            
            for (let i = 0; i < significantKeywords.length; i++) {
                const k1 = significantKeywords[i];
                keywordData[k1].coKeywords.forEach(k2 => {
                    if (keywordSet.has(k2) && k1 < k2) {
                        links.push({ source: k1, target: k2 });
                    }
                });
            }
            
            // Create visualization
            const container = document.getElementById('network');
            const width = container.clientWidth;
            const height = container.clientHeight;
            
            const svg = d3.select('#network')
                .append('svg')
                .attr('width', width)
                .attr('height', height);
            
            // Force simulation
            const simulation = d3.forceSimulation(nodes)
                .force('link', d3.forceLink(links).id(d => d.id).distance(50))
                .force('charge', d3.forceManyBody().strength(-60))
                .force('center', d3.forceCenter(width / 2, height / 2))
                .force('collision', d3.forceCollide().radius(d => d.fontSize * 2));
            
            // Draw links (behind text)
            const link = svg.append('g')
                .selectAll('line')
                .data(links)
                .join('line')
                .attr('class', 'link');
            
            // Draw nodes (text only)
            const node = svg.append('g')
                .selectAll('g')
                .data(nodes)
                .join('g')
                .attr('class', 'node')
                .call(d3.drag()
                    .on('start', dragstarted)
                    .on('drag', dragged)
                    .on('end', dragended));
            
            node.append('text')
                .attr('text-anchor', 'middle')
                .attr('dominant-baseline', 'middle')
                .attr('font-size', d => d.fontSize + 'px')
                .text(d => d.id);
            
            // Tooltip
            const tooltip = d3.select('#tooltip');
            
            node.on('mouseover', (event, d) => {
                tooltip
                    .style('opacity', 1)
                    .style('left', (event.pageX + 15) + 'px')
                    .style('top', (event.pageY - 10) + 'px')
                    .html(`
                        <div class="keyword">${d.id}</div>
                        <div class="stats">${d.journalCount} journal${d.journalCount > 1 ? 's' : ''}</div>
                        <div class="authors">Written by: ${d.authors.join(', ')}</div>
                        <div class="click-hint">Click to explore</div>
                    `);
            })
            .on('mouseout', () => {
                tooltip.style('opacity', 0);
            })
            .on('click', (event, d) => {
                window.location.href = `/journals?keyword=${encodeURIComponent(d.id)}`;
            });
            
            // Tick
            simulation.on('tick', () => {
                link
                    .attr('x1', d => d.source.x)
                    .attr('y1', d => d.source.y)
                    .attr('x2', d => d.target.x)
                    .attr('y2', d => d.target.y);
                
                node.attr('transform', d => `translate(${d.x},${d.y})`);
            });
            
            function dragstarted(event) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                event.subject.fx = event.subject.x;
                event.subject.fy = event.subject.y;
            }
            
            function dragged(event) {
                event.subject.fx = event.x;
                event.subject.fy = event.y;
            }
            
            function dragended(event) {
                if (!event.active) simulation.alphaTarget(0);
                event.subject.fx = null;
                event.subject.fy = null;
            }
        });
    </script>
</body>
</html>
